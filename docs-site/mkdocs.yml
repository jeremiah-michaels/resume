site_name: Jeremiah Michaels Portfolio
site_description: This site houses all portfolio content for Jeremiah Michaels.
site_author: Jeremiah Michaels (shout out Anthropic Claude)

theme:
  name: material
  palette: 
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top          # Back to top button
    - search.suggest          # Search suggestions
    - search.highlight        # Highlight search terms

plugins:
  - search
  - swagger-ui-tag

nav:
  - Home: index.md
  - Samples: writing-samples.md
  - Projects:
    - File API: projects/file-api.md
    - File API Docs:
      - Overview: projects/api/overview.md
      - Endpoints: projects/api/endpoints.md
      - Interactive Reference: projects/api/reference.md
  - About Jeremiah: about.md