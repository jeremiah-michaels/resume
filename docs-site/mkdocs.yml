site_name: Jeremiah Michaels Portfolio
site_description: This site houses all portfolio content for Jeremiah Michaels.
site_author: Jeremiah Michaels (shout out Anthropic Claude)

theme:
  name: material
  palette: 
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top          # Back to top button
    - search.suggest          # Search suggestions
    - search.highlight        # Highlight search terms

plugins:
  - search
  - swagger-ui-tag

nav:
  - Home: index.md
  - About: about.md
  - API Docs:
    - Overview: api/overview.md
    - Endpoints: api/endpoints.md
    - Interactive Reference: api/reference.md
  - Samples: writing-samples.md
  - Projects:
    - File API: projects/file-api.md